<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamePay Rewards - Claim Center</title>
    <style>
        :root {
            --primary: #00f2fe;
            --success: #25D366;
            --bg: #0d1117;
            --card: #161b22;
            --border: #30363d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header h1 { text-align: center; font-size: 22px; color: var(--primary); margin-bottom: 20px; }

        .btn-tiktok {
            display: block;
            text-align: center;
            background: #fff;
            color: #000;
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            margin-bottom: 20px;
            border: 2px solid var(--primary);
        }

        label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 5px; text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0d1117;
            color: white;
            box-sizing: border-box;
            margin-bottom: 15px;
            outline: none;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--success), #128C7E);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

        #preview { width: 100%; border-radius: 8px; margin-bottom: 15px; display: none; border: 1px solid var(--border); }
        #loader { display: none; text-align: center; font-size: 12px; color: var(--primary); margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>GamePay Rewards</h1>
    </div>

    <label>Langkah 1: Wajib Follow</label>
    <a href="https://www.tiktok.com/@gamepaymyid" target="_blank" class="btn-tiktok">FOLLOW @gamepaymyid</a>

    <label>Username TikTok</label>
    <input type="text" id="username" placeholder="@username_kamu">

    <label>Metode Pencairan</label>
    <select id="metode">
        <option value="DANA">DANA</option>
        <option value="GOPAY">GOPAY</option>
        <option value="BCA">BCA</option>
        <option value="SEABANK">SEABANK</option>
    </select>

    <label>Nomor Dana/Rekening</label>
    <input type="number" id="nomor" placeholder="08xxxx">

    <label>Upload Bukti Follow</label>
    <input type="file" id="foto_bukti" accept="image/*" onchange="previewFile()">
    <img id="preview">

    <div id="loader">⏳ Sedang mengunggah bukti ke server...</div>
    <button onclick="kirimData()" id="btn-kirim" class="btn-submit">KLAIM REWARD SEKARANG</button>
</div>

<script>
    function previewFile() {
        const preview = document.getElementById('preview');
        const file = document.getElementById('foto_bukti').files[0];
        const reader = new FileReader();

        reader.onloadend = function () {
            preview.src = reader.result;
            preview.style.display = "block";
        }

        if (file) { reader.readAsDataURL(file); }
    }

    async function kirimData() {
        const user = document.getElementById('username').value;
        const met = document.getElementById('metode').value;
        const nom = document.getElementById('nomor').value;
        const fileInput = document.getElementById('foto_bukti');
        const btn = document.getElementById('btn-kirim');
        const loader = document.getElementById('loader');

        if (!user || !nom || !fileInput.files[0]) {
            alert("⚠️ Harap isi Username, Nomor, dan Foto Bukti!");
            return;
        }

        btn.disabled = true;
        loader.style.display = "block";

        const formData = new FormData();
        formData.append("image", fileInput.files[0]);

        try {
            // Menggunakan API Key milik kamu
            const response = await fetch("https://api.imgbb.com/1/upload?key=c66bae6af4474f68931eb650646a46dc", {
                method: "POST",
                body: formData
            });

            const result = await response.json();

            if (result.success) {
                const linkFoto = result.data.url;
                const noWA = "6282294274058";
                const teks = `*KLAIM REWARD GAMEPAY*%0A--------------------------%0A*User:* ${user}%0A*Via:* ${met}%0A*No:* ${nom}%0A*Bukti:* ${linkFoto}%0A--------------------------`;

                window.location.href = `https://wa.me/${noWA}?text=${teks}`;
            } else {
                alert("Gagal mengunggah foto. Pastikan formatnya gambar (JPG/PNG).");
            }
        } catch (error) {
            alert("Terjadi gangguan jaringan atau API Key bermasalah.");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
